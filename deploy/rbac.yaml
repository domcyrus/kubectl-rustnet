apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: rustnet-debug
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["create", "delete", "get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/attach"]
    verbs: ["create"]
  - apiGroups: ["policy"]
    resources: ["podsecuritypolicies"]
    verbs: ["use"]
    resourceNames: ["rustnet-debug"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: rustnet-debug
subjects:
  - kind: User
    name: YOUR_USERNAME
    apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: ClusterRole
  name: rustnet-debug
  apiGroup: rbac.authorization.k8s.io

name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: "1.26"

      - name: Build plugin
        run: go build -o kubectl-rustnet ./cmd/kubectl-rustnet

      - name: Install kind
        run: go install sigs.k8s.io/kind@latest

      - name: Install kubectl
        uses: azure/setup-kubectl@829323503d1be3d00ca8346e5391ca0b07a9ab0d # v5.1.0

      - name: Create kind cluster
        run: kind create cluster --config e2e/kind-config.yaml --wait 60s

      - name: Pull and load rustnet image
        run: |
          docker pull ghcr.io/domcyrus/rustnet:latest || true
          kind load docker-image ghcr.io/domcyrus/rustnet:latest || true

      - name: Run e2e tests
        run: go test ./e2e/ -v -timeout 300s
        env:
          KUBECTL_RUSTNET_BIN: ${{ github.workspace }}/kubectl-rustnet

      - name: Cleanup
        if: always()
        run: kind delete cluster

name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26"

      - name: Build plugin
        run: go build -o kubectl-rustnet ./cmd/kubectl-rustnet

      - name: Install kind
        run: go install sigs.k8s.io/kind@latest

      - name: Install kubectl
        uses: azure/setup-kubectl@15650b3ad78fff148532a140b8a4c821796b2d7b # v5.0.0

      - name: Create kind cluster
        run: kind create cluster --config e2e/kind-config.yaml --wait 60s

      - name: Pull and load rustnet image
        run: |
          docker pull ghcr.io/domcyrus/rustnet:latest || true
          kind load docker-image ghcr.io/domcyrus/rustnet:latest || true

      - name: Run e2e tests
        run: go test ./e2e/ -v -timeout 300s
        env:
          KUBECTL_RUSTNET_BIN: ${{ github.workspace }}/kubectl-rustnet

      - name: Cleanup
        if: always()
        run: kind delete cluster
